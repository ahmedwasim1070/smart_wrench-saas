services:
  # For database
  db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    restart: always
    environment:
      POSTGRES_DB:  ${COMPOSE_PROJECT_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${COMPOSE_PROJECT_NAME}_data:/var/lib/postgresql/data
    networks:
      - app-network

  # For Backend
  backend:
    build: ./Backend
    container_name: ${COMPOSE_PROJECT_NAME}-api
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${COMPOSE_PROJECT_NAME};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: "${COMPOSE_PROJECT_NAME}-api"
      Jwt__Audience: "${COMPOSE_PROJECT_NAME}-frontend"
    depends_on:
      - db
    networks:
      - app-network

  # For Frontend
  frontend_proxy:
    build: ./Frontend
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    restart: always
    ports:
      - "80:80"   # For HTTP - docker_port:nginx_port 
      # - "443:443" # For Https - enable it for prod 
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  carworkshop_data: